<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0e0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>OrderFlow</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0e0f12; color: #d7d9dd;
      font: 13px/1.4 -apple-system, system-ui, sans-serif; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; }
    #bar { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      padding-top: calc(8px + env(safe-area-inset-top)); background: #15171b;
      border-bottom: 1px solid #23262c; }
    #sym { font-weight: 600; }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: #c0392b; flex: 0 0 auto; }
    #dot.ok { background: #27ae60; }
    #age { margin-left: auto; color: #8a8f98; font-variant-numeric: tabular-nums; }
    .tbtn { -webkit-appearance: none; appearance: none; border: 1px solid #2c2f36;
      background: #1b1e24; color: #9aa0aa; border-radius: 6px; padding: 4px 9px;
      font: inherit; font-size: 12px; }
    .tbtn.on { background: #233; color: #4fd1c5; border-color: #2c5; }
    #chart { flex: 1 1 auto; min-height: 0; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center; z-index: 50; }
    .modal.hidden { display: none; }
    .modal-card { background: #15171b; border: 1px solid #23262c; border-radius: 10px;
      width: min(560px, 94vw); max-height: 80vh; overflow: auto; }
    .modal-head { display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid #23262c; font-weight: 600; }
    .modal-body { padding: 8px 12px 12px; }
    table.acct { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    table.acct th, table.acct td { text-align: right; padding: 6px 8px; border-bottom: 1px solid #1f2228; white-space: nowrap; }
    table.acct th:first-child, table.acct td:first-child { text-align: left; }
    table.acct th { color: #8a8f98; font-weight: 500; font-size: 11px; }
    .pos { color: #26a69a; } .neg { color: #ef5350; } .dim { color: #6a6f78; }
    .dot2 { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c0392b; margin-right: 6px; }
    .dot2.ok { background: #27ae60; }
  </style>
</head>
<body>
  <div id="app">
    <div id="bar">
      <span id="dot"></span>
      <span id="sym">—</span>
      <span id="status">connecting…</span>
      <button id="fp-btn" class="tbtn on">FP</button>
      <button id="vp-btn" class="tbtn on">VP</button>
      <button id="cvd-btn" class="tbtn on">CVD</button>
      <button id="tbl-btn" class="tbtn">TBL</button>
      <button id="lvl-btn" class="tbtn on">LVL</button>
      <button id="acct-btn" class="tbtn">$</button>
      <span id="age"></span>
    </div>
    <div id="chart"></div>
  </div>

  <div id="acct-modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head"><span>Accounts</span><button id="acct-close" class="tbtn">✕</button></div>
      <div id="acct-body" class="modal-body"></div>
    </div>
  </div>

  <!-- TradingView Lightweight Charts v4 (standalone). v4 has addCandlestickSeries(); -->
  <!-- v5 moved to addSeries(CandlestickSeries, ...). Pinned for API stability. -->
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="/footprint-primitive.js"></script>
  <script src="/vp-primitive.js"></script>
  <script src="/table-primitive.js"></script>
  <script src="/draw-primitive.js"></script>
  <script src="/app.js"></script>
</body>
</html>
